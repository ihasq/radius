name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  test-unit:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install fixture dependencies
        run: |
          cd tests/fixtures/ts-project && bun install
      - name: Build radiusd binary
        run: bash scripts/build.sh
      - run: bun test --timeout 60000 tests/update-crypto.test.ts tests/update-version.test.ts tests/ledger-unit.test.ts tests/colors.test.ts
        env:
          FORCE_COLOR: "0"

  test-basic:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install fixture dependencies
        run: |
          cd tests/fixtures/ts-project && bun install
      - name: Build radiusd binary
        run: bash scripts/build.sh
      - run: bun test --timeout 60000 tests/basic.test.ts tests/history.test.ts tests/dogtag.test.ts
        env:
          FORCE_COLOR: "0"

  test-lsp:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun add -g typescript-language-server typescript
      - name: Verify fixture deps
        run: |
          ls -la tests/fixtures/ts-project/node_modules/@types/node/index.d.ts 2>&1 || echo "MISSING: @types/node"
          cat tests/fixtures/ts-project/package.json
      - name: Run LSP tests (with retry)
        run: |
          bun test --timeout 60000 tests/lsp-core.test.ts tests/lsp-diagnostics.test.ts tests/lsp-lifecycle.test.ts tests/diagnostics-tracking.test.ts 2>&1 | tee /tmp/lsp-test.log \
          || bun test --timeout 60000 tests/lsp-core.test.ts tests/lsp-diagnostics.test.ts tests/lsp-lifecycle.test.ts tests/diagnostics-tracking.test.ts 2>&1 | tee /tmp/lsp-test.log
        env:
          FORCE_COLOR: "0"
          RADIUS_DEBUG: "1"
      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lsp-test-log
          path: /tmp/lsp-test.log

  test-extensions:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install fixture dependencies
        run: |
          cd tests/fixtures/ts-project && bun install
      - name: Build radiusd binary
        run: bash scripts/build.sh
      - run: bun test --timeout 60000 tests/extension-host.test.ts tests/openvsx.test.ts
        env:
          FORCE_COLOR: "0"

  test-commands:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install fixture dependencies
        run: |
          cd tests/fixtures/ts-project && bun install
      - name: Build radiusd binary
        run: bash scripts/build.sh
      - run: bun test --timeout 60000 tests/search-replace.test.ts tests/rename-imports.test.ts tests/graph.test.ts
        env:
          FORCE_COLOR: "0"

  test-codeactions:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun add -g typescript-language-server typescript
      - name: Run codeactions tests (with retry)
        run: |
          bun test --timeout 60000 tests/group-codeactions.test.ts tests/group-lspviews.test.ts tests/group-langtools.test.ts 2>&1 | tee /tmp/codeactions-test.log \
          || bun test --timeout 60000 tests/group-codeactions.test.ts tests/group-lspviews.test.ts tests/group-langtools.test.ts 2>&1 | tee /tmp/codeactions-test.log
        env:
          FORCE_COLOR: "0"
          RADIUS_DEBUG: "1"
      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codeactions-test-log
          path: /tmp/codeactions-test.log

  test-multiagent:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install fixture dependencies
        run: |
          cd tests/fixtures/ts-project && bun install
      - name: Build radiusd binary
        run: bash scripts/build.sh
      - run: bun test --timeout 60000 tests/multi-agent.test.ts tests/multi-agent-e2e.test.ts tests/change-metadata.test.ts tests/versioned-socket.test.ts
        env:
          FORCE_COLOR: "0"

  test-tsrad:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install ts-project dependencies
        run: cd tests/fixtures/ts-project && bun install
      - name: Install heavy-project dependencies
        run: cd tests/fixtures/heavy-project && npm install
      - name: Build radiusd binary
        run: bash scripts/build.sh
      - name: Run ts-rad tests (depth 0-4, context, resources)
        run: |
          bun test --timeout 90000 \
            tests/ts-rad-depth0.test.ts \
            tests/ts-rad-depth1.test.ts \
            tests/ts-rad-depth2.test.ts \
            tests/ts-rad-depth3.test.ts \
            tests/ts-rad-depth4.test.ts \
            tests/ts-rad-context.test.ts \
            tests/ts-rad-resource.test.ts
        env:
          FORCE_COLOR: "0"

  test-context:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run context tests (mostly skipped)
        run: |
          bun test --timeout 60000 \
            tests/context-conventions.test.ts \
            tests/context-read.test.ts \
            tests/context-write.test.ts
        env:
          FORCE_COLOR: "0"

  test-phases:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install fixture dependencies
        run: |
          cd tests/fixtures/ts-project && bun install
      - name: Build radiusd binary
        run: bash scripts/build.sh
      - name: Run Phase A-C tests
        run: |
          bun test --timeout 60000 \
            tests/create-enhanced.test.ts \
            tests/tag-chain-visual.test.ts \
            tests/llm-readable-view.test.ts
        env:
          FORCE_COLOR: "0"
      - name: Run Phase 7-8 RDSX tests
        run: |
          bun test --timeout 60000 \
            tests/rdsx-spec.test.ts \
            tests/rdsx-rs.test.ts \
            tests/rdsx-cpp.test.ts \
            tests/rdsx-go.test.ts \
            tests/rdsx-zig.test.ts
        env:
          FORCE_COLOR: "0"
      - name: Run Phase 9 suggestion tests
        run: |
          bun test --timeout 60000 \
            tests/command-suggest.test.ts
        env:
          FORCE_COLOR: "0"

  build:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build radiusd binary
        run: bash scripts/build.sh
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radiusd-build
          path: |
            dist/
            scripts/radiusd.sh

  test-update-e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: radiusd-build
      - name: Setup radiusd for test
        run: |
          cp scripts/radiusd.sh radiusd
          chmod +x radiusd
      - run: bun test --timeout 60000 tests/update-e2e.test.ts
        env:
          FORCE_COLOR: "0"
