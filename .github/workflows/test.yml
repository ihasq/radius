name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  test-unit:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test --timeout 60000 tests/update-crypto.test.ts tests/update-version.test.ts tests/ledger-unit.test.ts tests/colors.test.ts
        env:
          FORCE_COLOR: "0"

  test-basic:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test --timeout 60000 tests/basic.test.ts tests/history.test.ts tests/dogtag.test.ts
        env:
          FORCE_COLOR: "0"

  test-lsp:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun add -g typescript-language-server typescript
      - run: bun test --timeout 60000 tests/lsp-core.test.ts tests/lsp-diagnostics.test.ts tests/lsp-lifecycle.test.ts tests/diagnostics-tracking.test.ts
        env:
          FORCE_COLOR: "0"

  test-extensions:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test --timeout 60000 tests/extension-host.test.ts tests/openvsx.test.ts
        env:
          FORCE_COLOR: "0"

  test-commands:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test --timeout 60000 tests/search-replace.test.ts tests/rename-imports.test.ts tests/graph.test.ts
        env:
          FORCE_COLOR: "0"

  test-codeactions:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun add -g typescript-language-server typescript
      - run: bun test --timeout 60000 tests/group-codeactions.test.ts tests/group-lspviews.test.ts tests/group-langtools.test.ts
        env:
          FORCE_COLOR: "0"

  test-multiagent:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test --timeout 60000 tests/multi-agent.test.ts tests/multi-agent-e2e.test.ts tests/change-metadata.test.ts
        env:
          FORCE_COLOR: "0"

  build:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build radiusd-core binary
        run: bun build --compile --target=bun-linux-x64 src/daemon/main.ts --outfile dist/radiusd-core
      - name: Prepare radiusd shell script
        run: |
          cp scripts/radiusd.sh radiusd
          chmod +x radiusd
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radiusd-build
          path: |
            radiusd
            dist/radiusd-core

  test-update-e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: radiusd-build
      - name: Set permissions
        run: |
          chmod +x radiusd
          chmod +x dist/radiusd-core
      - run: bun test --timeout 60000 tests/update-e2e.test.ts
        env:
          FORCE_COLOR: "0"
