name: Attach Bootstrap Release Assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bootstrap/release-assets/**"
      - ".github/workflows/attach-bootstrap-assets.yml"

permissions:
  contents: write

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p gh >/dev/null || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && \
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list && \
            sudo apt-get update && sudo apt-get install -y gh)

      - name: Upload bootstrap assets to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)
          echo "Attaching bootstrap assets to ${TAG}"
          gh release upload "$TAG" --repo "${{ github.repository }}" \
            bootstrap/release-assets/latest.json \
            bootstrap/release-assets/pub.json \
            bootstrap/release-assets/*.gz \
            bootstrap/release-assets/*.gz.sig \
            --clobber
